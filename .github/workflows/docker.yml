name: Build Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      - name: Download ZIP from Google Drive
        run: |
          FILE_ID=1OAo-WmC369RsBCNCWUFocJRTqHkCa5Oh

          wget --quiet --save-cookies cookies.txt \
               --keep-session-cookies \
               --no-check-certificate \
               "https://docs.google.com/uc?export=download&id=${FILE_ID}" -O- \
               | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p' > confirm.txt

          wget --load-cookies cookies.txt \
               "https://docs.google.com/uc?export=download&confirm=$(<confirm.txt)&id=${FILE_ID}" \
               -O rag-project.zip

      - name: Verify file type
        run: file rag-project.zip

      - name: Unzip project
        run: unzip rag-project.zip

      - name: List files (debug)
        run: ls -R

      - name: Build Docker image
        run: docker build -t rag-project .
